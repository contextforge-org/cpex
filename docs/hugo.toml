baseURL = "https://contextforge-org.github.io/cpex/"
languageCode = "en-us"
title = "CPEX Documentation"
theme = "hugo-book"

# TEMPORARY (docs reposition, restore to "error" in U9): the new tree is written
# across several commits and pages cross-link forward, so an unwritten target
# should warn, not fail the build. U9 restores the default hard-fail and confirms
# zero unresolved refs.
refLinksErrorLevel = "warning"

[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "docs"
  BookRepo = "https://github.com/contextforge-org/cpex"
  BookSearch = true
  BookComments = false
  BookEditLink = '{{ .Site.Params.BookRepo }}/edit/main/docs/{{ .Path }}'
  BookLogo = "images/cpex_v1.png"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  # style = "bw"
  lineNos = false

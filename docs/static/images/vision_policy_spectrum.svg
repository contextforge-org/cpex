<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 400" font-family="IBM Plex Sans">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="5" refX="4" refY="2.25" orient="auto">
      <path d="M0,0 L5,2.25 L0,4.5 z" fill="#9e9e9e"/>
    </marker>
  </defs>
  <rect width="1500" height="400" fill="#ffffff"/>

  <!-- soft -->
  <rect x="50" y="60" width="400" height="210" rx="14" fill="#f5f5f5"/>
  <text x="250" y="125" font-size="30" fill="#161616" text-anchor="middle">soft</text>
  <text x="250" y="165" font-size="21" fill="#5f5f5f" text-anchor="middle">prompt-level</text>
  <text x="250" y="215" font-size="21" fill="#161616" text-anchor="middle" font-style="italic">style &#183; tone &#183; refusals</text>

  <line x1="455" y1="165" x2="540" y2="165" stroke="#9e9e9e" stroke-width="4.5" marker-end="url(#arrow)"/>

  <!-- enforcement -->
  <rect x="550" y="60" width="400" height="210" rx="14" fill="#e2e2e2"/>
  <text x="750" y="125" font-size="30" fill="#161616" text-anchor="middle">enforcement</text>
  <text x="750" y="165" font-size="21" fill="#5f5f5f" text-anchor="middle">tool / A2A authorization</text>
  <text x="750" y="215" font-size="21" fill="#161616" text-anchor="middle" font-style="italic">redaction &#183; delegation</text>

  <line x1="955" y1="165" x2="1040" y2="165" stroke="#9e9e9e" stroke-width="4.5" marker-end="url(#arrow)"/>

  <!-- hard -->
  <rect x="1050" y="60" width="400" height="210" rx="14" fill="#161616"/>
  <text x="1250" y="125" font-size="30" fill="#ffffff" text-anchor="middle">hard</text>
  <text x="1250" y="165" font-size="21" fill="#bdbdbd" text-anchor="middle">infra boundary</text>
  <text x="1250" y="215" font-size="21" fill="#ffffff" text-anchor="middle" font-style="italic">identity &#183; info-flow &#183; audit</text>

  <!-- axis -->
  <line x1="50" y1="330" x2="1442" y2="330" stroke="#c9c9c9" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="50" y="372" font-size="19" fill="#5f5f5f">advisory</text>
  <text x="1450" y="372" font-size="19" fill="#5f5f5f" text-anchor="end">enforced at the boundary</text>
</svg>

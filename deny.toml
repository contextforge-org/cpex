# cargo-deny configuration — supply-chain gate run by `make audit` and the
# supply-chain CI workflow. Checks advisories, licenses, dependency bans, and
# crate sources.

[advisories]
unmaintained = "all"
maximum-db-staleness = "P30D"
# Every entry below is in a DEV-only or BUILD-time path — none ship in a
# published library crate's runtime graph (verified via `cargo deny check
# advisories` dependency trees). Revisit when the upstream test/build deps
# release fixes.
ignore = [
    # --- Dev-only: testcontainers test harness for cpex-session-valkey ---
    # tar/PAX extraction flaws in astral-tokio-tar pulled by testcontainers;
    # only run by the #[ignore]d Valkey integration tests.
    "RUSTSEC-2026-0066",
    "RUSTSEC-2026-0112",
    "RUSTSEC-2026-0113",
    "RUSTSEC-2026-0145",
    # rustls-pemfile unmaintained, via bollard -> testcontainers (dev-only).
    "RUSTSEC-2025-0134",
    # --- Dev-only: RSA keypair generation in cpex-plugin-identity-jwt tests ---
    # Marvin timing sidechannel in `rsa`; no safe upgrade available. Test-only
    # (fixture keygen); the crate validates JWTs, it does not generate RSA keys.
    "RUSTSEC-2023-0071",
    # --- Build-time proc-macro: biscuit-quote -> biscuit-auth ---
    # proc-macro-error2 unmaintained; runs only at compile time, never shipped.
    "RUSTSEC-2026-0173",
]

[licenses]
# SPDX expressions we accept. Extend deliberately — a new entry means a new
# license obligation we are taking on.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# No git dependencies: every crate resolves from crates.io.
allow-git = []

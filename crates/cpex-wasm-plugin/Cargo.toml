[package]
name = "cpex-wasm-plugin"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.57"
wit-bindgen-rt = "0.44"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
cpex-payload = { path = "../cpex-payload" }

[package.metadata.component]
package = "cpex:plugin"

#
# CPEX Demo FFI — demo plugins for Go example.
#
# Builds a staticlib that includes cpex-ffi symbols transitively.
# Go links only this library to get both the core FFI surface and
# the demo plugin factories.

[package]
name = "cpex-demo-ffi"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false

# Demo example crate: not part of the released workspace. Pinned to its own
# version and skipped by `cargo release` (which otherwise bumps every member
# to the shared workspace version).
[package.metadata.release]
release = false

[lib]
crate-type = ["staticlib", "cdylib"]

[dependencies]
cpex-core = { path = "../../../crates/cpex-core" }
cpex-ffi = { path = "../../../crates/cpex-ffi" }
async-trait = "0.1"
tracing = "0.1"

[lints]
workspace = true

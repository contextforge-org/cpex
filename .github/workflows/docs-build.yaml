# ===============================================================
# Docs Build - Verify documentation builds without errors
# ===============================================================

name: Docs Build

on:
  workflow_call:
  push:
    branches: ["main", "dev"]
    paths:
      - "docs/**"
      - ".github/workflows/docs-build.yaml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main", "dev"]
    paths:
      - "docs/**"
      - ".github/workflows/docs-build.yaml"

permissions:
  contents: read

jobs:
  docs-build:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Hugo Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      # Build with a root-relative baseURL so the link checker can resolve
      # internal links against the built files rather than the live site.
      - name: Build docs
        working-directory: docs
        run: hugo --minify --baseURL "/"

      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: --no-progress --root-dir "${{ github.workspace }}/docs/public" "docs/public/**/*.html"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

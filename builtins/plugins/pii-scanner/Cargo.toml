# cpex-plugin-pii-scanner — CMF plugin that detects PII patterns (SSN,
# credit card, email) in tool/prompt/resource args and either denies
# the call, taints the session, or redacts the matching values.

[package]
name = "cpex-plugin-pii-scanner"
version.workspace      = true
edition.workspace      = true
license.workspace      = true
authors.workspace      = true
description = "CPEX CMF plugin — detects and redacts PII (SSN, credit card, email) in tool/prompt args."
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[dependencies]
cpex-core = { path = "../../../crates/cpex-core", version = "0.2.0" }

async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
regex       = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }

[lints]
workspace = true

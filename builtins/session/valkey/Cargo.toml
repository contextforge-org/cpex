#
# cpex-session-valkey — a Valkey-backed `SessionStore` for distributed,
# cross-restart persistence of session security labels.
#
# # Dependency discipline
#
# This crate is OPTIONAL and feature-gated into cpex-ffi (`valkey` feature)
# and excluded from the workspace `default-members`, so the Valkey client +
# its TLS/async stack never land in the default FFI artifact or everyday
# `cargo build`. The redis client is pinned with
# `default-features = false` and a rustls TLS path to stay openssl-free,
# matching the `reqwest = { features = ["rustls-tls"] }` discipline in
# cpex-plugin-identity-jwt / cpex-plugin-delegator-oauth.

[package]
name = "cpex-session-valkey"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "CPEX session store — Valkey/Redis-backed distributed session labels."
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[dependencies]
apl-cpex = { path = "../../../crates/apl-cpex", version = "0.2.0" }
async-trait = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
sha2 = "0.10"
# URL building/parsing so connection credentials are percent-encoded and
# the wire scheme is consistent with the TLS setting (already in the tree
# via redis-rs).
url = "2"
# Async Valkey/Redis client. `default-features = false` drops the command
# groups we don't use (acl/geo/script/streams/json). `tokio-rustls-comp`
# selects the rustls TLS path (tokio-rustls + rustls), keeping the tree
# openssl-free; `connection-manager` adds reconnect-with-backoff.
redis = { version = "1.2", default-features = false, features = [
    "aio",
    "tokio-comp",
    "tokio-rustls-comp",
    "connection-manager",
] }
# External async connection pool over redis-rs. Forward the rustls TLS
# feature explicitly so the rediss:// path is robust even if feature
# unification with the redis dep ever changes.
deadpool-redis = { version = "0.23", default-features = false, features = [
    "rt_tokio_1",
    "tokio-rustls-comp",
] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
# Spins a real `valkey/valkey` container for integration tests; these are
# `#[ignore]`d by default and run via a dedicated job (see tests/).
testcontainers-modules = { version = "0.13", features = ["valkey"] }
testcontainers = "0.26"

[lints]
workspace = true

# Location: ./integrations/praxis-cpex/examples/praxis.yaml
#
# Slice-B example Praxis config. Chain order:
#
#   1. `mcp`   — Praxis's built-in JSON-RPC parser. Reads the body,
#                writes mcp.method/mcp.name to ctx.filter_metadata.
#   2. `cpex`  — our integration. Reads the metadata, runs identity
#                + APL policy. Rejects 401 (auth) / 403 (policy).
#   3. `router` + `load_balancer` — forward to the MCP backend.
#
# The mcp filter has to come BEFORE cpex so the metadata is set by
# the time cpex's on_request_body fires.

listeners:
  - name: gateway
    address: "127.0.0.1:8080"
    protocol: http
    filter_chains:
      - main

clusters:
  - name: mcp-backend
    endpoints:
      - "127.0.0.1:3000"

filter_chains:
  - name: main
    filters:
      - filter: mcp
        # Praxis's built-in MCP envelope parser. Defaults work for the
        # demo; see Praxis docs for max_body_bytes / on_invalid /
        # header_validation knobs.

      - filter: cpex
        config_path: integrations/praxis-cpex/examples/cpex.yaml
        # body_access:
        #   read_only   — APL can inspect bodies but mutations are
        #                 discarded (default; cheap)
        #   read_write  — APL `redact()` / `assign()` on `args.<field>`
        #                 actually rewrite the upstream JSON-RPC body
        body_access: read_write

      - filter: router
        routes:
          - path_prefix: "/"
            cluster: mcp-backend

      - filter: load_balancer

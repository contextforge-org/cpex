# Test fixture — validator/pii-scan in redact mode.
#
# Used by test_manager.py to cover the modified_payload round-trip:
# a cmf.tool_pre_invoke invoke with a payload containing an SSN →
# continue_processing=True, modified_payload present with SSN replaced by [PII].

plugins:
  - name: pii_redact
    kind: validator/pii-scan
    version: 1.0.0
    hooks:
      - cmf.tool_pre_invoke
    mode: sequential
    priority: 10
    on_error: fail
    config:
      mode: redact
      detect:
        - kind: ssn
